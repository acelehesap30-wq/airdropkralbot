services:
  - type: web
    name: airdropkral-admin
    runtime: node
    plan: free
    buildCommand: npm install --workspaces --include=dev && npm run build:webapp && npm run sync:webapp:assets && npm run build:miniapp
    startCommand: npm run start:all
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: LOOP_V2_ENABLED
        value: "1"
      - key: ADMIN_TELEGRAM_ID
        value: "1995400205"
      - key: BOT_USERNAME
        value: "airdropkral_2026_bot"
      - key: BOT_DRY_RUN
        value: "0"
      - key: BOT_ENABLED
        value: "1"
      - key: KEEP_ADMIN_ON_BOT_EXIT
        value: "1"
      - key: BOT_AUTO_RESTART
        value: "1"
      - key: BOT_INSTANCE_LOCK_KEY
        value: "7262026"
      - key: FLAG_SOURCE_MODE
        value: env_locked
      - key: ADMIN_API_PORT
        value: "10000"
      - key: PORT
        value: "10000"
      - key: WEBAPP_PUBLIC_URL
        value: https://webapp.k99-exchange.xyz/webapp
      - key: WEBAPP_VERSION_OVERRIDE
        value: ""
      - key: DATABASE_SSL
        value: "1"
      - key: TOKEN_TX_VERIFY
        value: "1"
      - key: TOKEN_TX_VERIFY_STRICT
        value: "0"
      - key: ARENA_AUTH_ENABLED
        value: "1"
      - key: RAID_AUTH_ENABLED
        value: "1"
      - key: PVP_WS_ENABLED
        value: "0"
      - key: TOKEN_CURVE_ENABLED
        value: "1"
      - key: TOKEN_AUTO_APPROVE_ENABLED
        value: "1"
      - key: WEBAPP_REACT_V1_ENABLED
        value: "1"
      - key: WEBAPP_REACT_V1_EXPERIMENT_KEY
        value: webapp_react_v1
      - key: WEBAPP_REACT_V1_TREATMENT_PCT
        value: "100"
      - key: WEBAPP_ANALYTICS_FLUSH_INTERVAL_MS
        value: "6000"
      - key: WEBAPP_ANALYTICS_MAX_BATCH_SIZE
        value: "40"
      - key: WEBAPP_ANALYTICS_SAMPLE_RATE
        value: "1"
      - key: WEBAPP_V3_ENABLED
        value: "1"
      - key: WEBAPP_TS_BUNDLE_ENABLED
        value: "1"
      - key: MINIAPP_ENABLED
        value: "1"
      - key: MINIAPP_V3_ADMIN_TG_ID
        value: "1995400205"
      - key: WALLET_AUTH_V1_ENABLED
        value: "1"
      - key: KYC_THRESHOLD_V1_ENABLED
        value: "1"
      - key: MONETIZATION_CORE_V1_ENABLED
        value: "1"
      - key: WALLET_VERIFY_MODE
        value: format_only
      - key: WALLET_CHALLENGE_TTL_SEC
        value: "300"
      - key: WALLET_SESSION_TTL_SEC
        value: "86400"
      - key: KYC_RISK_THRESHOLD
        value: "0.75"
      - key: KYC_PAYOUT_BTC_THRESHOLD
        value: "0.001"
      - key: KYC_REQUIRE_IF_WALLET_UNLINKED
        value: "0"
      - key: WEBAPP_AUTH_TTL_SEC
        value: "900"
      - key: PAYOUT_BTC_THRESHOLD
        value: "0.0001"
      - key: HC_TO_BTC_RATE
        value: "0.00001"
      - key: PAYOUT_COOLDOWN_HOURS
        value: "72"
      - key: RUNTIME_GUARD_BASE_URL
        value: https://webapp.k99-exchange.xyz
